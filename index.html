<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<title>chords — jazz piano practice</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- Atmospheric drift layers -->
<div class="bg-base"></div>
<div class="bg-drift bg-drift-a"></div>
<div class="bg-drift bg-drift-b"></div>
<div class="bg-grain"></div>

<!-- Mobile drawer scrim -->
<div id="sidebar-scrim" class="sidebar-scrim"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <a class="brand" href="#/play">
      <span class="brand-glyph">◐</span>
      <span class="brand-text mono">chords</span>
    </a>
  </div>
  <nav class="side-nav" id="side-nav"></nav>
  <div class="sidebar-foot">
    <p class="sidebar-fineprint mono">Web MIDI: Chrome · Edge · Opera<br>Tap keys if no device<br>No audio output — use your DAW</p>
  </div>
</aside>

<header class="top-header">
  <button class="drawer-toggle" id="drawer-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="top-spacer"></div>
  <div class="top-status">
    <span class="status-pill mono">
      <span class="status-dot idle" id="midi-dot"></span>
      <span id="midi-status-text">Connecting…</span>
    </span>
  </div>
</header>

<main id="main-pane" class="main-pane"></main>

<!-- Scripts in dependency order -->
<script src="./js/theory.js"></script>
<script src="./js/midi.js"></script>
<script src="./js/keyboard.js"></script>
<script src="./js/staff.js"></script>
<script src="./js/metronome.js"></script>
<script src="./js/router.js"></script>
<script src="./js/pages/play.js"></script>
<script src="./js/pages/practice.js"></script>
<script src="./js/pages/book.js"></script>
<script src="./js/pages/inspiration.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
